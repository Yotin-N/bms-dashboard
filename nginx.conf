user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;

  upstream backend_round_robin {
    ip_hash;
    server 10.143.106.100:5555;
  }

  server {
    listen 80;
    server_name va.opsioc.com www.va.opsioc.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name va.opsioc.com www.va.opsioc.com;

    ssl_certificate /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/PrivateKey.key;
    ssl_trusted_certificate /etc/nginx/certs/gd_bundle-g2-g1.crt;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'HIGH:!aNULL:!MD5';
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass http://backend_round_robin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /bms {
      return 301 /bms/;
    }


    location /bms/api/ {
      proxy_pass http://10.143.106.100:3001/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bms/ {
      alias /var/www/bms-frontend/;
      index index.html;
      try_files $uri $uri/ /bms/index.html;
    }

    location /socket.io/ {
      proxy_pass http://10.143.106.100:3002/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_cache off;
      proxy_buffering off;
      proxy_read_timeout 86400s;
    }

    location /bms/socket.io/ {
      proxy_pass http://10.143.106.100:3002/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_cache off;
      proxy_buffering off;
      proxy_read_timeout 86400s;
    }

    location /api {
      proxy_pass http://10.143.106.100:8880$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api2 {
      proxy_pass http://10.143.106.100:3001$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /analytics {
      proxy_pass http://10.143.106.100:3000$request_uri;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods GET,POST,OPTIONS;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api2/alert {
      proxy_pass http://10.143.106.100:3001$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      keepalive_timeout 3600s;
    }

    location = /middleware {
      return 301 /middleware/;
    }

    location /middleware/ {
      alias /var/www/middleware-frontend/;
      index index.html;
      try_files $uri $uri/ index.html;
    }

    location /middleware/backend/ {
      rewrite ^/backend/(.*)$ /$1 break;
      proxy_pass http://10.143.106.100:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    }

    location /backend/ {
      rewrite ^/backend/(.*)$ /$1 break;
      proxy_pass http://10.143.106.100:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

  }
}
